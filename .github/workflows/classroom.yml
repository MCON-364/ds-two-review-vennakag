name: Autograding Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ── Exercises (3 × 20 = 60 pts) ─────────────────────────────────────────
      - name: ActionHistory
        id: action-history
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "ActionHistory"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=ActionHistoryTest"
          timeout: 10
          max-score: 20

      - name: LogProcessor
        id: log-processor
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "LogProcessor"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=LogProcessorTest"
          timeout: 15
          max-score: 20

      - name: TicketReportBuilder
        id: ticket-report-builder
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "TicketReportBuilder"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=TicketReportBuilderTest"
          timeout: 10
          max-score: 20

      # ── Homework (3 × 20 = 60 pts) ───────────────────────────────────────────
      - name: PrintQueue
        id: print-queue
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "PrintQueue"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=PrintQueueTest"
          timeout: 10
          max-score: 20

      - name: SensorProcessor
        id: sensor-processor
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "SensorProcessor"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=SensorProcessorTest"
          timeout: 15
          max-score: 20

      - name: SubmissionReportBuilder
        id: submission-report-builder
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "SubmissionReportBuilder"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=SubmissionReportBuilderTest"
          timeout: 10
          max-score: 20

      # ── TreesAndThreads (100 pts) ───────────────────────────────────────────
      - name: EmployeeRosterTest
        id: employee-roster-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "EmployeeRosterTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.exercises.EmployeeRosterTest"
          timeout: 20
          max-score: 17

      - name: WordFrequencyCounterTest
        id: word-frequency-counter-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "WordFrequencyCounterTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.exercises.WordFrequencyCounterTest"
          timeout: 20
          max-score: 17

      - name: ConcurrentLeaderboardTest
        id: concurrent-leaderboard-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "ConcurrentLeaderboardTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.exercises.ConcurrentLeaderboardTest"
          timeout: 20
          max-score: 16

      - name: ConcurrentEventLogTest
        id: concurrent-event-log-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "ConcurrentEventLogTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.homework.ConcurrentEventLogTest"
          timeout: 20
          max-score: 17

      - name: LibraryCatalogTest
        id: library-catalog-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "LibraryCatalogTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.homework.LibraryCatalogTest"
          timeout: 20
          max-score: 16

      - name: StudentGradeBookTest
        id: student-grade-book-test
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "StudentGradeBookTest"
          setup-command: ""
          command: "mvn -B -ntp test -Dtest=edu.touro.mcon364.finalreview.treesandthreads.homework.StudentGradeBookTest"
          timeout: 20
          max-score: 17

      # ── Reporter ─────────────────────────────────────────────────────────────
      - name: Autograding Reporter
        if: always()
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          ACTION-HISTORY_RESULTS: "${{ steps.action-history.outputs.result }}"
          LOG-PROCESSOR_RESULTS: "${{ steps.log-processor.outputs.result }}"
          TICKET-REPORT-BUILDER_RESULTS: "${{ steps.ticket-report-builder.outputs.result }}"
          PRINT-QUEUE_RESULTS: "${{ steps.print-queue.outputs.result }}"
          SENSOR-PROCESSOR_RESULTS: "${{ steps.sensor-processor.outputs.result }}"
          SUBMISSION-REPORT-BUILDER_RESULTS: "${{ steps.submission-report-builder.outputs.result }}"
          EMPLOYEE-ROSTER-TEST_RESULTS: "${{ steps.employee-roster-test.outputs.result }}"
          WORD-FREQUENCY-COUNTER-TEST_RESULTS: "${{ steps.word-frequency-counter-test.outputs.result }}"
          CONCURRENT-LEADERBOARD-TEST_RESULTS: "${{ steps.concurrent-leaderboard-test.outputs.result }}"
          CONCURRENT-EVENT-LOG-TEST_RESULTS: "${{ steps.concurrent-event-log-test.outputs.result }}"
          LIBRARY-CATALOG-TEST_RESULTS: "${{ steps.library-catalog-test.outputs.result }}"
          STUDENT-GRADE-BOOK-TEST_RESULTS: "${{ steps.student-grade-book-test.outputs.result }}"
        with:
          runners: action-history,log-processor,ticket-report-builder,print-queue,sensor-processor,submission-report-builder
